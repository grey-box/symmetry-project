name: CI

on:
  pull_request:
    branches: [main, develop]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: symmetry-unified-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: symmetry-unified-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run tests
        run: pytest -m "not slow and not external" --tb=short --junitxml=report.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: symmetry-unified-backend/report.xml

  frontend-docker:
    name: Frontend Docker Build & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t symmetry-frontend:test ./desktop-electron-frontend

      - name: Start container
        run: |
          docker run -d --name frontend-test \
            -p 5173:5173 \
            -e HOST=0.0.0.0 \
            -e PORT=5173 \
            symmetry-frontend:test

      - name: Wait for frontend to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend is ready"
              exit 0
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 2
          done
          echo "Frontend failed to start"
          docker logs frontend-test
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f frontend-test || true

  frontend-build:
    name: Frontend Web Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop-electron-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: desktop-electron-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build:web

  integration-test:
    name: Docker Compose Integration
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Waiting for backend... ($i/60)"
            sleep 5
          done
          echo "Backend failed health check"
          docker compose logs backend
          exit 1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend is ready"
              exit 0
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 2
          done
          echo "Frontend failed to start"
          docker compose logs frontend
          exit 1

      - name: Verify API docs
        run: curl -sf http://localhost:8000/docs | grep -q "swagger" || curl -sf http://localhost:8000/docs | grep -q "Swagger"

      - name: Cleanup
        if: always()
        run: docker compose down -v
