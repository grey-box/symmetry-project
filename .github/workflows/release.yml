name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    needs: test
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      new_version: ${{ steps.tag.outputs.new_version }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          release_branches: main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: Release ${{ steps.tag.outputs.new_tag }}
          body: |
            ## What's Changed

            ${{ steps.tag.outputs.changelog }}

            ---

            **Docker images**: `ghcr.io/${{ github.repository }}/backend:${{ steps.tag.outputs.new_version }}` and `ghcr.io/${{ github.repository }}/frontend:${{ steps.tag.outputs.new_version }}`
          draft: false
          prerelease: false

  docker-publish:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: release
    strategy:
      matrix:
        include:
          - context: symmetry-unified-backend
            image: backend
          - context: desktop-electron-frontend
            image: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.new_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.new_tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
