[[fact_extraction_models]]
id = "distilbart-cnn-12-6"
name = "DistilBART CNN 12-6"
provider = "huggingface"
model_name = "sshleifer/distilbart-cnn-12-6"
description = "Distilled BART model fine-tuned on CNN/DailyMail, good for extractive-style summarization on CPU"
task = "summarization"
prompt_style = "plain"
use_chat_template = false

[[fact_extraction_models]]
id = "t5-small"
name = "T5 Small"
provider = "huggingface"
model_name = "google-t5/t5-small"
description = "Lightweight T5 model at ~240MB, requires instruction prefix. Good CPU performance for summarization tasks."
task = "summarization"
prompt_style = "prefix"
use_chat_template = false
prompt_prefix = "summarize: "

[saved_models.huggingface]
comparison = [
  "sentence-transformers/LaBSE",
  "xlm-roberta-base",
  "multi-qa-distilbert-cos-v1",
  "multi-qa-MiniLM-L6-cos-v1",
  "multi-qa-mpnet-base-cos-v1",
]
translation = []

[saved_models.custom]
comparison = []
translation = []

[saved_models.selected]
comparison = "sentence-transformers/LaBSE"
translation = "/path/to/T5-custom"
